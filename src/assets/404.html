<!DOCTYPE html>
<html>
<head>
	<link rel="icon" src="favicon.ico"/>
	<title>404 Not found</title>
	<style>
		@font-face {
			font-family: "Public Sans";
			src: url("font/PublicSans-Variable.woff2") format("woff2");
			font-weight: 100 900;
			font-style: normal;
		}

		@font-face {
			font-family: "Clash Display";
			src: url("font/ClashDisplay-Variable.woff2") format("woff2");
			font-weight: 200 700;
			font-style: normal;
		}
		body {
			margin: 0;
			--bg: black;
			--fg: white;
			--gray: #787878;
			background: var(--bg);
			color: var(--fg);
			font-family: "Public Sans", system-ui, sans-serif;
			main {
				left: 50%;
				top: 50%;
				transform: translate(-50%, -50%);
				width: 16em;
				position: fixed;
				font-size: 1.125rem;
				text-align: center;
				h1 {
					font-family: "Clash Display", sans-serif;
					font-weight: 700;
					letter-spacing: 0.5rem;
					margin: 0;
					font-size: 7em;
					line-height: 100%;
				}
				h2 {
					font-family: "Clash Display", sans-serif;
					font-weight: 600;
					margin: 0;
					line-height: 100%;
					font-size: 2.25em;
				}
				p {
					margin: 1em 0;
				}
				img {
					width: 2rem;
					height: 2rem;
					margin: 0 auto;
					display: block;
					margin-top: 3rem;
					user-select: none;
				}
				a {
					text-decoration: none;
					padding: 0.5rem 1rem;
					margin: 0 auto;
					margin-top: 0.5rem;
					display: inline-block;
					user-select: none;
					border: solid 1px var(--gray);
					animation: 30s infinite rainbow;
					color: var(--gray);
					&:hover {
						color: white;
						border-color: white;
					}
				}
			}
		}
		::selection {
			background: white;
			color: black;
		}
	</style>
</head>
<body>
	<main>
		<h1><span style="color: cyan;">4</span><span style="color: magenta;">0</span><span style="color: yellow;">4</span></h1>
		<h2>Not found</h2>
		<!-- <p>The page you are looking for might have been removed, had its name changed, or be temporarily unavailable.</p> -->
		<p>Sorry about that.</p>
		<a href="https://music.astronomy487.com/">Go to home page</a>
		<!-- <img src="https://astronomy487.com/logo/assets/cmy-big.svg"> -->
	</main>
</body>
</html>
